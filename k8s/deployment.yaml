apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-vpn
  namespace: default  # change to your namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-vpn
  template:
    metadata:
      labels:
        app: auth-vpn
    spec:
      containers:
        - name: auth-vpn
          image: <your-registry>/auth-vpn:latest  # replace with your image after: docker build + push
          imagePullPolicy: Always
          env:
            - name: AUTH_VPN_PORT
              value: "7777"  # change if 7777 is taken; update the ports below to match
          ports:
            - name: vpn
              containerPort: 7777
            - name: dashboard
              containerPort: 9100
            - name: ssh
              containerPort: 2222
          securityContext:
            capabilities:
              add:
                - NET_ADMIN   # TUN device, ip commands, iptables
                - NET_RAW     # iptables raw table
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: config
              mountPath: /etc/auth-vpn
            - name: tun-device
              mountPath: /dev/net/tun
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: auth-vpn-data
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
